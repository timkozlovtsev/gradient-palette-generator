<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="output.css" rel="stylesheet">
</head>

<body>
    <div class="flex flex-col overflow-hidden h-screen">
        <div id="nav" class="shrink-0 flex justify-center basis-16 items-center gap-16 bg-gray-100">
            <a href="index.html" data-enabled class="data-enabled:text-blue-700  font-bold">Editor</a>
            <a href="export" class="data-enabled:text-blue-700 font-bold">Export</a>
            <a href="gallery" class="data-enabled:text-blue-700 font-bold">Gallery</a>
        </div>
        <div id="editor" class="grow flex">
            <div id="settings" class="h-full flex flex-col w-1/3">
                <div class="w-64 flex gap-2 m-2">
                    <div class="grow flex items-baseline rounded-xl p-2 bg-gray-100">
                        <p>Width:</p>
                        <input type="number" min="1" max="10" step="1" id="input-palette-size-x" class="w-full
                            m-1 bg-gray-200 rounded-sm p-0.5" />
                    </div>
                    <div class="grow flex items-baseline rounded-xl p-2 bg-gray-100">
                        <p>Height:</p>
                        <input type="number" min="1" max="4" step="1" id="input-palette-size-y" class="w-full
                            m-1 bg-gray-200 rounded-sm p-0.5" />
                    </div>
                </div>
                <div class="w-64 flex flex-col rounded-xl m-2 p-2 bg-gray-100">
                    <span class="mb-1">Top color</span>
                    <div id="picker1" class="aspect-square border-dashed border-2 border-gray-400 rounded-sm">
                        <!-- TODO: saturation + value picker -->
                    </div>
                    <div class="mt-2 h-5 border-dashed border-2 border-gray-400 rounded-sm">
                        <!-- TODO: hue picker -->
                    </div>
                </div>
                <div class="w-64 flex flex-col rounded-xl m-2 p-2 bg-gray-100">
                    <span class="mb-1">Bottom color</span>
                    <div id="picker2" class="aspect-square border-dashed border-2 border-gray-400 rounded-sm">
                        <!-- TODO: saturation + value picker -->
                    </div>
                    <div class="mt-2 h-5 border-dashed border-2 border-gray-400 rounded-sm">
                        <!-- TODO: hue picker -->
                    </div>
                </div>
            </div>
            <div class="w-1/3 flex justify-center">
                <div id="palette" class="h-1/2 grid aspect-square self-center">

                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
