<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
</head>

<body>
    <div class="flex flex-col overflow-hidden h-screen">
        <div id="nav" class="flex justify-center h-16 items-center gap-16 bg-gray-100">
            <a href="#" data-enabled class="data-enabled:text-blue-700 font-bold">Editor</span>

                <a href="#" class="data-enabled:text-blue-700 font-bold"></a>Gallery</span>
        </div>

            <div id="settings">
                <div class="flex items-center">
                    <span class="flex h-8 items-center">x:

                <div class="bg-linear-to-t from-cyan-600 to-purple-400"></div>
                <div class="bg-linear-to-t from-cyan-600 to-purple-400"></div>

                <div class="bg-linear-to-t from-cyan-600 to-purple-400"></div>
                <div class="bg-linear-to-t from-cyan-600 to-purple-400"></div>
                <div class="bg-linear-to-t from-cyan-600 to-purple-400"></div>
                <div class="bg-linear-to-t from-cyan-600 to-purple-400"></div>

    </div>
