<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="output.css" rel="stylesheet">
</head>

<body>
    <div class="flex flex-col overflow-auto h-screen">
        <div id="nav" class="shrink-0 flex justify-center basis-16 items-center gap-16 bg-gray-100">
            <a href="index.html" class="data-enabled:text-blue-700  font-semibold">Editor</a>
            <a href="export" data-enabled class="data-enabled:text-blue-700 font-semibold">Export</a>
            <a href="gallery" class="data-enabled:text-blue-700 font-semibold">Gallery</a>
            <a href="faq" class="data-enabled:text-blue-700 font-semibold">FAQ</a>
        </div>
        <div class="mt-2 h-1/2 self-center grow flex flex-col items-center gap-2">
            <img class="w-full aspect-square border-dashed border-2" alt="тут будет созданная палитра в формате png">
            <div class="px-16 w-full">
                <button class="py-3 w-full bg-blue-400 hover:bg-blue-300 transition-all duration-75 rounded-xl">Copy
                    link</button>
            </div>
            <span class="font-semibold">Publish to gallery</span>
            <form id="publish-form" class="w-full flex flex-col gap-2">
                <div class="flex flex-col">
                    <label for="publish-author" class="font-light">
                        Author name
                        <span class="text-red-500">*    </span>
                    </label>
                    <input id="publish-author" type="text"
                     class="border-2 data-error:border-red-300 border-gray-200 rounded-xl h-8 p-2">
                </div>
                <div class="flex flex-col">
                    <label for="publish-title" class="font-light">
                        Palette title
                        <span class="text-red-500">*    </span>
                    </label>
                    <input id="publish-title" type="text"
                     class="border-2 data-error:border-red-300 border-gray-200 rounded-xl h-8 p-2">
                </div>
                <div class="flex flex-col">
                    <label for="publish-email" class="font-light">
                        Email
                        <span class="text-red-500">*    </span>
                    </label>
                    <input id="publish-email" type="email"
                     class="border-2 data-error:border-red-300 border-gray-200 rounded-xl h-8 p-2">
                </div>
                <div class="flex flex-col">
                    <label for="publish-description" class="font-light">
                        Description
                    </label>
                    <input id="publish-description" type="text"
                     class="border-2 data-error:border-red-300 border-gray-200 rounded-xl h-8 p-2">
                </div>
                <input type="submit" value="Publish"
                class="bg-blue-400 hover:bg-blue-300 transition-all duration-75 rounded-xl px-2 w-fit mx-auto">
            </form>
        </div>
    </div>
    <script src="validation.js"></script>
    <script src="logger.js"></script>
</body>

</html>
